name: Issue Gate

on:
  issues:
    types: [opened, reopened]

jobs:
  check-contributor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check issue author
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const VALID_CAPABILITIES = new Set(['issue', 'pr']);
            const USERNAME_PATTERN = /^[A-Za-z0-9]([A-Za-z0-9-]{0,37}[A-Za-z0-9])?$/;
            const issueAuthor = context.payload.issue.user.login;
            const defaultBranch = context.payload.repository.default_branch;

            if (issueAuthor.endsWith('[bot]') || issueAuthor === 'dependabot[bot]') {
              console.log(`Skipping bot: ${issueAuthor}`);
              return;
            }

            async function getPermission(username) {
              try {
                const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username,
                });
                return permissionLevel.permission;
              } catch {
                return null;
              }
            }

            async function getTextFile(path) {
              const { data: fileContent } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: defaultBranch,
              });

              if (!('content' in fileContent) || typeof fileContent.content !== 'string') {
                throw new Error(`Expected file content for ${path}`);
              }

              return Buffer.from(fileContent.content, 'base64').toString('utf8');
            }

            function parseApprovedUsers(content) {
              const users = new Map();
              let previousKey = null;

              for (const rawLine of content.split('\n')) {
                const line = rawLine.trim();
                if (!line || line.startsWith('#')) continue;

                const parts = line.split(/\s+/);
                if (parts.length !== 2) {
                  throw new Error(`Malformed contributor entry: ${rawLine}`);
                }

                const [username, capability] = parts;
                const normalizedCapability = capability.toLowerCase();
                const normalizedUsername = username.toLowerCase();
                if (!USERNAME_PATTERN.test(username)) {
                  throw new Error(`Invalid GitHub username: ${username}`);
                }
                if (!VALID_CAPABILITIES.has(normalizedCapability)) {
                  throw new Error(`Invalid contributor capability: ${rawLine}`);
                }
                if (users.has(normalizedUsername)) {
                  throw new Error(`Duplicate contributor: ${username}`);
                }
                if (previousKey && normalizedUsername < previousKey) {
                  throw new Error(`Contributor list is not sorted: ${username}`);
                }

                users.set(normalizedUsername, normalizedCapability);
                previousKey = normalizedUsername;
              }

              return users;
            }

            if (context.payload.action === 'reopened') {
              const actorPermission = await getPermission(context.actor);
              if (['admin', 'maintain'].includes(actorPermission)) {
                console.log(`${context.actor} deliberately reopened this issue`);
                return;
              }
            }

            const permission = await getPermission(issueAuthor);
            if (['admin', 'maintain', 'write'].includes(permission)) {
              console.log(`${issueAuthor} is a collaborator with ${permission} access`);
              return;
            }

            const approvedContent = await getTextFile('.github/APPROVED_CONTRIBUTORS');
            const approvedUsers = parseApprovedUsers(approvedContent);
            const capability = approvedUsers.get(issueAuthor.toLowerCase());

            if (capability === 'issue' || capability === 'pr') {
              console.log(`${issueAuthor} is approved for ${capability}`);
              return;
            }

            const message = [
              'This issue was auto-closed. Issues from new contributors are closed by default while maintainers review the queue.',
              '',
              `See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${defaultBranch}/CONTRIBUTING.md) for the contribution gate and quality bar.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
